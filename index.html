<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="이미지 속 개인정보를 브라우저에서 자동으로 감지·마스킹해주는 무료 온라인 도구. 파일이 서버로 전송되지 않습니다." />
  <title>MaskPrivacy — 개인정보 자동 마스킹 도구</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Pretendard 폰트 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <!-- Inter 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <div class="container">
      <div class="logo">
        <span class="logo-icon">🔒</span>
        <span class="logo-text">MaskPrivacy</span>
      </div>
      <p class="header-desc">이미지 속 개인정보를 브라우저에서 자동으로 감지·마스킹</p>
    </div>
  </header>

  <!-- 신뢰 뱃지 -->
  <section class="badges">
    <div class="container badges-wrap">
      <span class="badge">🔒 완전 로컬 처리</span>
      <span class="badge">⚡ 무료 사용</span>
      <span class="badge">🛡️ 서버 전송 없음</span>
    </div>
  </section>

  <!-- 메인 도구 영역 -->
  <main class="main">
    <div class="container">

      <!-- 업로드 존 -->
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp" hidden />
        <div class="upload-content" id="uploadContent">
          <div class="upload-icon">🔒</div>
          <p class="upload-title">이미지를 드래그하여 놓으세요</p>
          <p class="upload-sub">또는 클릭하여 파일 선택</p>
          <p class="upload-formats">PNG, JPG, WEBP 지원</p>
          <p class="upload-safe">✓ 파일이 서버로 전송되지 않습니다</p>
        </div>
      </div>

      <!-- 진행 바 (기본 숨김) -->
      <div class="progress-wrap" id="progressWrap" style="display:none;">
        <div class="progress-label" id="progressLabel">개인정보 탐지 중...</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- 미리보기 영역 (기본 숨김) -->
      <div class="preview-wrap" id="previewWrap" style="display:none;">
        <div class="preview-panel">
          <div class="preview-label">원본 이미지</div>
          <canvas id="originalCanvas"></canvas>
        </div>
        <div class="preview-panel">
          <div class="preview-label">마스킹 결과</div>
          <canvas id="maskedCanvas"></canvas>
        </div>
      </div>

      <!-- 탐지 항목 목록 (기본 숨김) -->
      <div class="detected-wrap" id="detectedWrap" style="display:none;">
        <h2 class="detected-title">탐지된 개인정보</h2>
        <ul class="detected-list" id="detectedList"></ul>
      </div>

      <!-- 다운로드 버튼 (기본 숨김) -->
      <div class="action-wrap" id="actionWrap" style="display:none;">
        <button class="btn-download" id="downloadBtn">
          ⬇ 마스킹 이미지 다운로드
        </button>
        <button class="btn-reset" id="resetBtn">
          ↺ 처음부터
        </button>
      </div>

    </div>
  </main>

  <!-- 푸터 -->
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">© 2026 MaskPrivacy. 모든 처리는 브라우저 내에서 이루어집니다.</p>
      <nav class="footer-nav">
        <a href="privacy.html">개인정보 처리방침</a>
        <a href="terms.html">이용약관</a>
        <a href="about.html">서비스 소개</a>
        <a href="blog/index.html">블로그</a>
      </nav>
    </div>
  </footer>

  <script src="js/maskprivacy.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</body>
</html>
